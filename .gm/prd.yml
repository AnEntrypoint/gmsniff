  witness: 'src/server.js readMemoryGraph: added body.replace(/\r\n/g,''\n'') before trim/slice. Verified via two real HTTP GETs against a freshly booted gui server: first GET caught the bug (raw \r\n in node.text), second GET (post-fix) confirmed zero \r bytes in any of 47 returned nodes.'
  commit_comment: Fixed CRLF not stripped from memory-graph node text
