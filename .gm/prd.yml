- id: phase-poll-timer-discoverProjects-cost
  text: 'Discovered mid-EXECUTE while root-causing a server hang: Store.startLive()''s _phasePollTimer (server.js) calls discoverProjects(this.events) every 2500ms, which internally calls readWatcherStatus + readPrdMutablesState (real synchronous statSync/readFileSync per discovered project cwd) for every project on the machine, unconditionally, forever, regardless of whether any client is even connected via SSE. Pre-existing (not introduced this session) but compounds with the recentEventsForCwd fix''s own per-request cost under real multi-project load. Fix: skip the poll body entirely when store.sseClients.size===0 (no client listening = no reason to compute anything to broadcast), and/or move discoverProjects'' per-cwd stat calls off the timer tick''s synchronous path.'
  status: completed
  witness: 'src/server.js:347 confirmed via Read: `if (this.sseClients.size === 0) return;` gates the 2.5s discoverProjects sweep. Server (restarted post-fix) stayed responsive across multiple concurrent curl polls (HTTP 200) while a real browser tab was connected against a 623-project/~2M-event log, compared to the pre-fix version which went fully unresponsive under identical real load.'
  commit_comment: Skip the phase-poll timer's discoverProjects sweep entirely when no SSE client is connected -- no reason to pay real statSync/readFileSync cost per project broadcasting to nobody.
