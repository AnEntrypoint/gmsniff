- id: live-agents-add-output-feed
  text: 'RESHAPED mid-EXECUTE: original naive per-project O(events) scan inside recentEventsForCwd caused /api/projects/live-state to be O(events*projects) -- live-witnessed this session as the local GUI server going fully unresponsive (all HTTP connections hung, including SSE) under real load (~2M events, multiple discovered projects, a real browser tab + the store''s own 2.5s phase-poll timer). Fixed: added Store._buildCwdActivityIndex() (one O(events) pass building cwd->latestSess and sess->events[] maps) built ONCE per /api/projects/live-state request; recentEventsForCwd now takes that index instead of re-scanning this.events per project. processTree''s node-classification logic factored into a shared _processTreeFromEvents(sess, evs) helper used by both the original single-session processTree() and the new index-based recentEventsForCwd(), avoiding a second copy of the instruction/transition/prd/mutable/deviation node-shape logic. Landed in src/server.js. Still needs: real-load re-verification (VERIFY phase) that a live browser tab against the local GUI server + populated multi-project log no longer hangs.'
  commit_comment: Added agent output-feed to Skill Layout drilldown; fixed a real production hang this surfaced under real multi-project load.
  status: completed
  witness: 'browser dispatches 15-18 against real local GUI server (port 8734, ~2M real events, 623 discovered projects): navigated to http://127.0.0.1:8734/, confirmed bootHash=#panel=skill-layout, rows=20, clicked a .ds-session-row, confirmed document.body.textContent includes ''Recent output''. Server survived the load (multiple concurrent curl polls returned 200) after the _buildCwdActivityIndex O(events) perf fix, resolving the real hang this session hit before the fix.'
