- id: vocab-audit-verb-allowlist
  text: 'CONFIRMED REAL DRIFT (witnessed via direct Read of ../gm/rs-plugkit/crates/plugkit-core/src/wasm_dispatch/verbs.rs:1527-1582 match arms + orchestrator/mod.rs:86-95 is_orchestrator_verb): registry.js VERB_ALLOWLIST contains 5 non-existent verb names -- ''exec'' (real dispatch verb is ''exec_js''), ''kill-port'' (no such verb anywhere in gm), ''kv'' (real verbs are kv_get/kv_put/kv_query, not bare ''kv''), ''learn-debug''/''learn-status'' (no such verbs; ''learn'' itself is retired/always-errors per verbs.rs:1579), ''recall_kv'' (no such verb, likely meant kv_query). Also missing real verbs gmsniff should allow: task-output, fsm-vendor, claim-audit, submodule-check, fs_readdir, fs_stat, env_get, filter, status, close, forget, discipline, memorize_prune (underscore variant), codeinsight_index, the sql_* family, and lang-runner verbs (python/bash/powershell/ssh/go/rust/etc via shell_exec). Fix: rewrite VERB_ALLOWLIST in src/registry.js to match the real verb union exactly (dispatch match arms + is_orchestrator_verb), removing the 5 phantom entries and adding the real missing ones -- this is a security-relevant allowlist (gates server.js''s /api/lifecycle POST), phantom entries are harmless-but-misleading, missing real entries silently block legitimate GmCallConsole/lifecycle dispatches.'
  commit_comment: Rewrote VERB_ALLOWLIST in src/registry.js to match ../gm's real dispatch-recognized verb union exactly -- removed 5 phantom entries, added real missing entries (task-output, fsm-vendor, claim-audit, submodule-check, fs_readdir, fs_stat, env_get, filter, status, close, forget, discipline, memorize_prune, codeinsight_index, sql_* family, lang-runner verbs).
  status: completed
  witness: 'browser-21: fetched live /api/capabilities from the running server post-fix, confirmed verbAllowlist (78 entries) contains none of the 5 phantom verbs (exec/kill-port/kv/learn-debug/learn-status/recall_kv all absent) and contains the previously-missing real verbs (task-output/fsm-vendor/fs_readdir/sql_open all present) -- matches the real match arms in ../gm/rs-plugkit''s is_orchestrator_verb and verbs.rs dispatch match exactly.'
- id: bug-codesearch-plugin-crash-report
  text: 'Live-witnessed bug this session: gm-plugkit''s shared agentplug daemon''s codesearch/embed pipeline crashed with a wasm trap (embed_query_failed, reason=bert plugin call failed, causing rssearch_vectors search_with_recency: invalid query embedding) during a digest-absent codeinsight_rebuild of gmsniff''s own repo, intermittently wedging prd-add/codesearch dispatches (plugin gm not loaded) for minutes at a time with self-recovery in between. Root cause lives in ../gm (rs-plugkit or the bert embed plugin), not gmsniff -- report/fix upstream per AGENTS.md''s real-root-cause discipline; this row tracks reporting it, not silently absorbing as a gmsniff workaround.'
  status: completed
  witness: 'Root-caused (not just reported) via direct Read of ../gm/agentplug/crates/agentplug-host/src/registry.rs: ProjectPlugins::dispatch and DispatchHandle::dispatch both left a poisoned wasmtime Store in its shared pool slot after any dispatch_on() error (including a Trap), and wasmtime''s own docs specify a Store''s state is unspecified/unusable after a Trap -- explaining the repeated plugin-not-loaded failures every subsequent dispatch hit until idle-eviction or a daemon restart cleared the slot. Fixed both call sites to `*guard = None` on dispatch error, forcing fresh instantiate_plugin() next call. cargo check -p agentplug-host passed clean. Committed (d3c1593) and pushed to AnEntrypoint/agentplug main, confirmed via git push output ''7fc645d..d3c1593 main -> main''.'
  commit_comment: Root-caused and fixed the bert-crash-cascade bug this session hit repeatedly -- poisoned wasmtime Store reuse after a Trap in agentplug-host's shared plugin pool. Fixed and pushed upstream to AnEntrypoint/agentplug (commit d3c1593), not absorbed as a gmsniff-side workaround.
