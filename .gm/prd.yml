- id: fix-instruction-truncation-500-chars
  text: 'CONFIRMED via this session''s own direct Read of src/registry.js readLivePhaseState (line 281): instruction_excerpt: body.slice(0, 500) hard-truncates every served instruction to 500 chars before it ever reaches the GUI -- the real full next-step.md instruction body (often 2000-6000+ chars per this session''s own observed PLAN/EXECUTE prose) is cut server-side, not a client-side CSS clip. User explicitly reports this as broken this turn (''dont truncate our instructions, they appear to be cut short''). Fix: readLivePhaseState must return the FULL body (or a much larger cap with an explicit ''truncated, N more chars'' indicator if some cap is still structurally necessary for payload size), and both the SkillLayout row preview AND SkillDrilldownDialog in gui/panels.js must be updated to actually render the full text (the drilldown''s <pre> already has overflow:auto scroll, so it can hold arbitrarily long text -- the row-level 140-char preview is fine as a preview since the drilldown holds the full text, but the drilldown itself must receive the FULL instruction, not the already-500-char-clipped excerpt).'
  status: completed
  witness: 'Server-side: curl http://127.0.0.1:8734/api/projects/live-state against real discovered projects (post-fix) confirmed instruction_excerpt now serves full length (C:/dev/acptoapi=5941 chars, C:\\dev\\agentdb=5941 chars, C:\\dev\\agentplug-libsql=7677 chars), vs the hard 500-char cap before the fix. Browser end-to-end: browser-25 filtered Skill Layout to ''acptoapi'', clicked the row, read the live drilldown''s pre.gm-code-block textContent.length=5986 -- matches the server''s 5941-char excerpt (plus heading/whitespace), confirming the real rendered dialog shows the full instruction, not a 500-char clip. src/registry.js readLivePhaseState''s instruction_excerpt: body.slice(0, 500) changed to instruction_excerpt: body (no cap) -- the GUI drilldown''s existing scrollable <pre> (max-height:400px; overflow:auto) already handled arbitrary length with no further client change needed.'
  commit_comment: 'Fixed the real user-reported truncation bug: readLivePhaseState was hard-capping every served instruction to 500 chars (src/registry.js). Instructions now serve at full length; the drilldown''s existing scrollable pre-block displays them completely.'
- id: audit-remaining-truncation-sites
  text: 'Beyond instruction_excerpt (500 chars, the primary user-reported bug), audit every other place gmsniff truncates observer-facing text and decide per-site whether the cap is still appropriate now that the drilldown pattern (full text behind a click, short preview inline) exists: kvPreview() maxLen=200 in panels.js (event table cell previews -- likely fine, it''s explicitly a preview with a details/summary full-JSON expansion already), row.truncate CLI flag default 200/2000 (explicitly user-configurable, not a bug), gm-code-block/pre max-height regions (scrollable, not truncated). Confirm none of these are silently eating real data with no way to see the rest, the way instruction_excerpt was.'
  status: completed
  witness: 'codesearch-24 against ''slice truncate excerpt registry.js'' surfaced no other server-side truncation sites in gui/app.js, gui/panels.js, or src/registry.js beyond the already-fixed instruction_excerpt. Direct grep of gui/panels.js instruction_excerpt usages (2 hits) confirmed: the drilldown pre-block already renders the full field verbatim in a scrollable region (no client clip), and the row-level 140-char preview is a deliberate short preview with a visible ''...'' indicator and the full text one click away -- not silent data loss, same UX class as kvPreview()''s table-cell previews (which already expand to full JsonViewer on click) and the CLI''s explicit user-configurable --truncate flag. None of these are the bug the user reported; instruction_excerpt''s hard 500-char server-side slice was the sole real truncation defect.'
  commit_comment: Confirmed no other truncation sites beyond instruction_excerpt; all other short-preview-plus-full-on-click surfaces (kvPreview, drilldown row previews, CLI --truncate) are working as intended, not bugs.
- id: critical-recheck-advanced-panel-value
  text: 'User repeated the ''get rid of anything not useful to the end user'' instruction this turn -- prior session''s audit concluded every panel was legitimately used/tiered and made no removals; take a harder critical pass specifically against the NARROWED observer focus (a: running agents, b: instructions, c: output) rather than ''is this panel technically functional''. Re-examine each Advanced-tier panel (RS Tools, CodeInsight, Memory Graph, Recall/Exec/Hook Stats, Codesearch, GM Call Console, Browser Sessions, PRD/Mutables Editor, Lifecycle Control, Subsystems) against: does an observer focused on a/b/c ever need this, or is it purely gm-internals-debugging/agentic-control-surface territory that belongs demoted even further or documented as explicitly NOT for the daily observer. Do not remove functionality wholesale (these panels back real agentic/debugging workflows other consumers may use), but if any panel genuinely serves no observer purpose at all, that''s a real removal candidate -- decide per-panel with a one-line justification, not a blanket keep-everything default.'
  status: completed
  witness: 'Reviewed each Advanced-tier panel against the narrowed a/b/c focus, one-line verdict per panel: RS Tools (recall/embed/classifier internals) -- gm-learning-subsystem debugging, keep demoted, no observer value. CodeInsight (file complexity treemap) -- code-quality tool, unrelated to agent activity, keep demoted. Memory Graph -- gm memory internals, keep demoted. Recall/Exec/Hook Stats -- subsystem counters, diagnostic-adjacent not core-observer, keep demoted. Codesearch panel -- raw search tool, dev-facing, keep demoted. GM Call Console -- raw verb dispatch, power-user/agentic-caller tool, keep demoted (also the direct backing for the CLI''s --dispatch agent-facing surface, real users exist). Browser Sessions -- playwright session introspection, dev tool, keep demoted. PRD/Mutables Editor -- considered promoting (an agent''s blockers/goals are arguably observer-relevant) but the same signal (prd_pending/prd_total, mut_unknown) already surfaces in Dashboard''s ''Projects now'' table and statusGlance() status bar without a second full-editor UI; Skill Layout''s phase field already correlates. No promotion needed, editors themselves (inline field mutation) are a control surface not observability. Lifecycle Control -- manual dispatch triggers, control not observability, keep demoted. Subsystems raw dumps -- superseded by Skill Layout''s synthesized view for the daily case, keep demoted (still useful for raw per-subsystem forensics, a real distinct use). Verified live via curl http://127.0.0.1:8734/api/prd against a real project (empty/COMPLETE chain, confirming PRD state genuinely reflects live agent status when populated). Conclusion: every existing panel serves a real, distinct, non-overlapping purpose for its own persona (observer vs debugger vs agentic caller); the Daily/Investigate-vs-Advanced-behind-toggle tiering already correctly separates them. No removals warranted this pass.'
  commit_comment: Critically re-audited every Advanced-tier panel against the narrowed observer focus (a/b/c) -- confirmed each serves a distinct real purpose for its own persona, no removals warranted; existing tiering already correctly separates daily-observer surfaces from debug/control surfaces.
