<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>gmsniff</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--border:#30363d;
  --text:#e6edf3;--muted:#8b949e;--accent:#58a6ff;--green:#3fb950;
  --red:#f85149;--yellow:#d29922;--purple:#bc8cff;--orange:#ffa657;
  --teal:#39d353;--pink:#ff7b72;
  font-family:'Segoe UI',system-ui,sans-serif;
}
body{background:var(--bg);color:var(--text);display:flex;flex-direction:column;height:100vh;overflow:hidden}
header{background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0}
header h1{font-size:15px;font-weight:600;letter-spacing:.5px}
#live-badge{font-size:11px;padding:2px 8px;border-radius:10px;background:var(--bg3);color:var(--muted);border:1px solid var(--border)}
#live-badge.live{color:var(--green);border-color:var(--green)}
#total-badge{margin-left:auto;font-size:12px;color:var(--muted)}
.layout{display:flex;flex:1;overflow:hidden}
nav{width:160px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);overflow-y:auto;padding:8px 0}
nav a{display:block;padding:7px 16px;font-size:13px;color:var(--muted);cursor:pointer;border-left:2px solid transparent;text-decoration:none}
nav a:hover{color:var(--text);background:var(--bg3)}
nav a.active{color:var(--accent);border-left-color:var(--accent);background:var(--bg3)}
nav .nav-section{padding:10px 16px 4px;font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--border);font-weight:600}
main{flex:1;overflow-y:auto;padding:16px}
.panel{display:none}
.panel.active{display:block}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:14px;margin-bottom:12px}
.card h2{font-size:13px;font-weight:600;margin-bottom:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px}
.stat{background:var(--bg3);border-radius:4px;padding:10px 12px}
.stat-val{font-size:22px;font-weight:700;color:var(--accent)}
.stat-lbl{font-size:11px;color:var(--muted);margin-top:2px}
.sub-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:6px;margin-top:8px}
.sub-btn{padding:6px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:4px;font-size:12px;cursor:pointer;color:var(--text);text-align:left}
.sub-btn:hover{border-color:var(--accent);color:var(--accent)}
.sub-btn span{display:block;font-size:18px;font-weight:700;color:var(--accent)}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:6px 10px;border-bottom:1px solid var(--border);color:var(--muted);font-weight:500;position:sticky;top:0;background:var(--bg2)}
td{padding:5px 10px;border-bottom:1px solid var(--bg3);vertical-align:top;word-break:break-all;max-width:300px}
tr:hover td{background:var(--bg3)}
.ts{color:var(--muted);font-size:10px;white-space:nowrap}
.badge{display:inline-block;padding:1px 6px;border-radius:10px;font-size:10px;font-weight:600}
.b-green{background:#1a4a1f;color:var(--green)}
.b-red{background:#4a1a1a;color:var(--red)}
.b-blue{background:#1a2f4a;color:var(--accent)}
.b-yellow{background:#3d3010;color:var(--yellow)}
.b-purple{background:#2a1a4a;color:var(--purple)}
.b-orange{background:#3d2610;color:var(--orange)}
.toolbar{display:flex;gap:8px;margin-bottom:10px;align-items:center;flex-wrap:wrap}
.toolbar input,.toolbar select{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:5px 10px;border-radius:4px;font-size:12px}
.toolbar input{flex:1;min-width:140px}
.toolbar input:focus,.toolbar select:focus{outline:none;border-color:var(--accent)}
.toolbar button{background:var(--accent);border:none;color:#0d1117;padding:5px 12px;border-radius:4px;font-size:12px;cursor:pointer;font-weight:600}
.toolbar button:hover{opacity:.85}
.pager{display:flex;gap:6px;align-items:center;margin-top:8px;font-size:12px;color:var(--muted)}
.pager button{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:3px 10px;border-radius:3px;font-size:12px;cursor:pointer}
.pager button:disabled{opacity:.4;cursor:default}
pre.json{font-size:10px;font-family:'Consolas',monospace;white-space:pre-wrap;word-break:break-all;background:var(--bg3);padding:8px;border-radius:3px;max-height:300px;overflow-y:auto}
.live-log{height:calc(100vh - 200px);overflow-y:auto;font-family:'Consolas',monospace;font-size:11px;line-height:1.5}
.live-log .entry{padding:2px 8px;border-bottom:1px solid var(--bg3)}
.live-log .entry:hover{background:var(--bg3)}
.live-log .sub-tag{margin-right:6px;padding:0 5px;border-radius:2px;font-size:10px}
.flex-row{display:flex;gap:12px;align-items:flex-start}
.flex-row .card{flex:1;min-width:0}
.mini-table{font-size:11px}
.mini-table td,.mini-table th{padding:4px 8px}
.bar-row{display:flex;align-items:center;gap:8px;margin:3px 0;font-size:12px}
.bar-bg{flex:1;background:var(--bg3);border-radius:2px;height:6px;overflow:hidden}
.bar-fill{background:var(--accent);height:100%;border-radius:2px}
.rate-big{font-size:32px;font-weight:700;color:var(--green)}
.err-rate{color:var(--red)}
details summary{cursor:pointer;list-style:none;user-select:none}
details summary::-webkit-details-marker{display:none}
.expand-btn{font-size:10px;color:var(--accent);margin-left:6px;cursor:pointer}
.pill{display:inline-block;padding:1px 7px;border-radius:10px;font-size:11px;background:var(--bg3);margin:1px}
</style>
</head>
<body>
<header>
  <h1>⬡ gmsniff</h1>
  <span id="live-badge">connecting…</span>
  <span id="total-badge"></span>
</header>
<div class="layout">
<nav id="nav">
  <div class="nav-section">Overview</div>
  <a onclick="show('overview')" class="active" data-panel="overview">Dashboard</a>
  <a onclick="show('days')" data-panel="days">By Day</a>
  <a onclick="show('live')" data-panel="live">Live Stream</a>
  <a onclick="show('events')" data-panel="events">All Events</a>
  <a onclick="show('search-panel')" data-panel="search-panel">Search</a>
  <div class="nav-section">Subsystems</div>
  <a onclick="showSub('hook')" data-panel="sub-hook">hook</a>
  <a onclick="showSub('exec')" data-panel="sub-exec">exec</a>
  <a onclick="showSub('rs_learn')" data-panel="sub-rs_learn">rs_learn</a>
  <a onclick="showSub('rs_codeinsight')" data-panel="sub-rs_codeinsight">rs_codeinsight</a>
  <a onclick="showSub('rs_search')" data-panel="sub-rs_search">rs_search</a>
  <a onclick="showSub('plugkit')" data-panel="sub-plugkit">plugkit</a>
  <a onclick="showSub('plugkit_wrapper')" data-panel="sub-plugkit_wrapper">plugkit_wrapper</a>
  <a onclick="showSub('bootstrap')" data-panel="sub-bootstrap">bootstrap</a>
  <div class="nav-section">Analytics</div>
  <a onclick="show('recall-panel')" data-panel="recall-panel">Recall Stats</a>
  <a onclick="show('exec-panel')" data-panel="exec-panel">Exec Stats</a>
  <a onclick="show('hooks-panel')" data-panel="hooks-panel">Hook Stats</a>
</nav>
<main id="main">

<!-- OVERVIEW -->
<div class="panel active" id="panel-overview">
  <div id="stats-area" class="stats-grid" style="margin-bottom:12px"></div>
  <div class="flex-row" id="overview-rows"></div>
</div>

<!-- DAYS -->
<div class="panel" id="panel-days">
  <div class="card"><h2>Events by Day</h2><div id="days-body"></div></div>
</div>

<!-- LIVE -->
<div class="panel" id="panel-live">
  <div class="card" style="padding:8px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
      <h2 style="margin:0">Live Stream</h2>
      <label style="font-size:12px;display:flex;align-items:center;gap:6px;cursor:pointer">
        <input type="checkbox" id="live-auto-scroll" checked> auto-scroll
      </label>
    </div>
    <div class="live-log" id="live-log"></div>
  </div>
</div>

<!-- ALL EVENTS -->
<div class="panel" id="panel-events">
  <div class="card">
    <div class="toolbar">
      <input id="ev-q" placeholder="filter…" oninput="evLoad()">
      <select id="ev-sub" onchange="evLoad()"><option value="">all subsystems</option></select>
      <select id="ev-event" onchange="evLoad()"><option value="">all events</option></select>
      <select id="ev-day" onchange="evLoad()"><option value="">all days</option></select>
    </div>
    <div id="ev-table"></div>
    <div class="pager">
      <button onclick="evPage(-1)" id="ev-prev">← prev</button>
      <span id="ev-info"></span>
      <button onclick="evPage(1)" id="ev-next">next →</button>
    </div>
  </div>
</div>

<!-- SEARCH -->
<div class="panel" id="panel-search-panel">
  <div class="card">
    <div class="toolbar">
      <input id="sq" placeholder="search all events…" onkeydown="if(event.key==='Enter')doSearch()">
      <select id="ssub"><option value="">all subsystems</option></select>
      <button onclick="doSearch()">Search</button>
    </div>
    <div id="search-results"></div>
  </div>
</div>

<!-- SUB PANELS (dynamic) -->
<div class="panel" id="panel-sub">
  <div class="card">
    <h2 id="sub-title"></h2>
    <div class="toolbar">
      <input id="sub-q" placeholder="filter…" oninput="subLoad()">
      <select id="sub-ev-filter" onchange="subLoad()"><option value="">all events</option></select>
      <select id="sub-day-filter" onchange="subLoad()"><option value="">all days</option></select>
    </div>
    <div id="sub-table"></div>
    <div class="pager">
      <button onclick="subPage(-1)" id="sub-prev">← prev</button>
      <span id="sub-info"></span>
      <button onclick="subPage(1)" id="sub-next">next →</button>
    </div>
  </div>
</div>

<!-- RECALL STATS -->
<div class="panel" id="panel-recall-panel">
  <div id="recall-body"></div>
</div>

<!-- EXEC STATS -->
<div class="panel" id="panel-exec-panel">
  <div id="exec-body"></div>
</div>

<!-- HOOKS STATS -->
<div class="panel" id="panel-hooks-panel">
  <div id="hooks-body"></div>
</div>

</main>
</div>
<script>
const SUB_COLORS = {hook:'#bc8cff',exec:'#58a6ff',rs_learn:'#3fb950',rs_codeinsight:'#ffa657',rs_search:'#d29922',plugkit:'#ff7b72',plugkit_wrapper:'#39d353',bootstrap:'#79c0ff'};
const SUB_LIST = ['plugkit','exec','hook','rs_learn','rs_codeinsight','rs_search','bootstrap','plugkit_wrapper'];

let currentPanel = 'overview';
let subCurrent = null;
let evOffset = 0; const evLimit = 100;
let subOffset = 0; const subLimit = 100;
let subFilters = {};

function show(name) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
  const p = document.getElementById('panel-' + name);
  if (p) p.classList.add('active');
  const a = document.querySelector(`nav a[data-panel="${name}"]`);
  if (a) a.classList.add('active');
  currentPanel = name;
  if (name === 'overview') loadOverview();
  else if (name === 'days') loadDays();
  else if (name === 'events') { evOffset = 0; populateSelects(); evLoad(); }
  else if (name === 'recall-panel') loadRecall();
  else if (name === 'exec-panel') loadExec();
  else if (name === 'hooks-panel') loadHooks();
}

function showSub(sub) {
  subCurrent = sub;
  subOffset = 0;
  subFilters = {};
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
  document.getElementById('panel-sub').classList.add('active');
  const a = document.querySelector(`nav a[data-panel="sub-${sub}"]`);
  if (a) a.classList.add('active');
  currentPanel = 'sub';
  document.getElementById('sub-title').textContent = sub;
  document.getElementById('sub-q').value = '';
  loadSubFilters(sub);
  subLoad();
}

async function loadOverview() {
  const snap = await api('/api/snapshot');
  const el = document.getElementById('stats-area');
  el.innerHTML = `
    ${stat(snap.total,'total events')}
    ${stat(snap.pids,'sessions')}
    ${stat(snap.errors,'errors','err-rate')}
    ${stat(Object.keys(snap.byDay||{}).length,'days')}
  `;
  document.getElementById('total-badge').textContent = `${snap.total} events`;
  const rows = document.getElementById('overview-rows');
  const bySub = snap.bySub || {};
  let subCards = '<div class="card" style="min-width:220px"><h2>Subsystems</h2>';
  for (const s of SUB_LIST) {
    const n = bySub[s] || 0;
    const pct = snap.total ? Math.round(n/snap.total*100) : 0;
    const col = SUB_COLORS[s] || '#8b949e';
    subCards += `<div class="bar-row"><span style="width:100px;color:${col};font-size:11px">${s}</span><div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${col}"></div></div><span style="font-size:11px;color:#8b949e;width:50px;text-align:right">${n}</span></div>`;
  }
  subCards += '</div>';
  const byEvent = snap.byEvent || {};
  const evSorted = Object.entries(byEvent).sort((a,b)=>b[1]-a[1]).slice(0,15);
  let evCard = '<div class="card" style="min-width:200px"><h2>Top Events</h2>';
  for (const [ev,n] of evSorted) evCard += `<div class="bar-row"><span style="flex:1;font-size:11px">${ev||'?'}</span><span style="color:#8b949e;font-size:11px">${n}</span></div>`;
  evCard += '</div>';
  rows.innerHTML = subCards + evCard;
}

async function loadDays() {
  const days = await api('/api/days');
  const el = document.getElementById('days-body');
  if (!days.length) { el.textContent='No data'; return; }
  let html = '<table><tr><th>Day</th><th>Total</th>';
  for (const s of SUB_LIST) html += `<th style="color:${SUB_COLORS[s]||'#8b949e'}">${s}</th>`;
  html += '</tr>';
  for (const d of days) {
    html += `<tr><td class="ts">${d.day}</td><td>${d.total}</td>`;
    for (const s of SUB_LIST) html += `<td>${d.bySub[s]||''}</td>`;
    html += '</tr>';
  }
  html += '</table>';
  el.innerHTML = html;
}

async function evLoad() {
  const q = document.getElementById('ev-q').value;
  const sub = document.getElementById('ev-sub').value;
  const ev = document.getElementById('ev-event').value;
  const day = document.getElementById('ev-day').value;
  const params = new URLSearchParams({limit:evLimit,offset:evOffset});
  if (q) params.set('q',q);
  if (sub) params.set('sub',sub);
  if (ev) params.set('event',ev);
  if (day) params.set('day',day);
  const data = await api('/api/events?'+params);
  document.getElementById('ev-table').innerHTML = renderTable(data.rows);
  document.getElementById('ev-info').textContent = `${evOffset+1}–${Math.min(evOffset+evLimit,data.total)} of ${data.total}`;
  document.getElementById('ev-prev').disabled = evOffset === 0;
  document.getElementById('ev-next').disabled = evOffset + evLimit >= data.total;
}

function evPage(dir) { evOffset = Math.max(0, evOffset + dir * evLimit); evLoad(); }

async function populateSelects() {
  const [snap, evTypes, days] = await Promise.all([api('/api/snapshot'), api('/api/event-types'), api('/api/days')]);
  const sub = document.getElementById('ev-sub');
  sub.innerHTML = '<option value="">all subsystems</option>';
  for (const s of SUB_LIST) sub.innerHTML += `<option>${s}</option>`;
  const evSel = document.getElementById('ev-event');
  evSel.innerHTML = '<option value="">all events</option>';
  for (const {event} of evTypes) evSel.innerHTML += `<option>${event}</option>`;
  const daySel = document.getElementById('ev-day');
  daySel.innerHTML = '<option value="">all days</option>';
  for (const d of days) daySel.innerHTML += `<option>${d.day}</option>`;
  const ssub = document.getElementById('ssub');
  ssub.innerHTML = '<option value="">all subsystems</option>';
  for (const s of SUB_LIST) ssub.innerHTML += `<option>${s}</option>`;
}

async function loadSubFilters(sub) {
  const [evTypes, days] = await Promise.all([api('/api/event-types?sub='+sub), api('/api/days')]);
  const ef = document.getElementById('sub-ev-filter');
  ef.innerHTML = '<option value="">all events</option>';
  for (const {event} of evTypes) ef.innerHTML += `<option>${event}</option>`;
  const df = document.getElementById('sub-day-filter');
  df.innerHTML = '<option value="">all days</option>';
  for (const d of days) df.innerHTML += `<option>${d.day}</option>`;
}

async function subLoad() {
  if (!subCurrent) return;
  const q = document.getElementById('sub-q').value;
  const ev = document.getElementById('sub-ev-filter').value;
  const day = document.getElementById('sub-day-filter').value;
  const params = new URLSearchParams({sub:subCurrent,limit:subLimit,offset:subOffset});
  if (q) params.set('q',q);
  if (ev) params.set('event',ev);
  if (day) params.set('day',day);
  const data = await api('/api/subsystem?'+params);
  document.getElementById('sub-table').innerHTML = renderTable(data.rows);
  document.getElementById('sub-info').textContent = `${subOffset+1}–${Math.min(subOffset+subLimit,data.total)} of ${data.total}`;
  document.getElementById('sub-prev').disabled = subOffset === 0;
  document.getElementById('sub-next').disabled = subOffset + subLimit >= data.total;
}

function subPage(dir) { subOffset = Math.max(0, subOffset + dir * subLimit); subLoad(); }

async function doSearch() {
  const q = document.getElementById('sq').value;
  const sub = document.getElementById('ssub').value;
  const params = new URLSearchParams({q});
  if (sub) params.set('sub',sub);
  const data = await api('/api/search?'+params);
  document.getElementById('search-results').innerHTML = renderTable(data.results || []);
}

async function loadRecall() {
  const r = await api('/api/recall');
  const el = document.getElementById('recall-body');
  const hitPct = r.total ? Math.round(r.hits/r.total*100) : 0;
  el.innerHTML = `
    <div class="flex-row">
      <div class="card">
        <h2>Recall Stats</h2>
        <div class="stats-grid">
          ${stat(r.total,'total recalls')}
          ${stat(r.hits,'hits')}
          ${stat(r.misses,'misses')}
          ${stat(r.avgDur+'ms','avg duration')}
        </div>
        <div style="margin-top:14px;text-align:center">
          <div class="rate-big${r.hitRate<0.5?' err-rate':''}">${hitPct}%</div>
          <div style="color:var(--muted);font-size:12px">hit rate</div>
        </div>
        <div style="margin-top:8px">
          <div class="bar-bg" style="height:10px;border-radius:4px"><div class="bar-fill" style="width:${hitPct}%;height:100%;background:${hitPct>50?'var(--green)':'var(--red)'}"></div></div>
        </div>
      </div>
      <div class="card" style="flex:2">
        <h2>Recent Recalls</h2>
        <table class="mini-table">
          <tr><th>Time</th><th>Query</th><th>Hit</th><th>ms</th></tr>
          ${(r.recent||[]).map(e=>`<tr><td class="ts">${fmtTs(e.ts)}</td><td>${esc(e.query||'')}</td><td>${e.hit?'<span class="badge b-green">hit</span>':'<span class="badge b-red">miss</span>'}</td><td>${e.dur_ms||''}</td></tr>`).join('')}
        </table>
      </div>
    </div>`;
}

async function loadExec() {
  const r = await api('/api/exec');
  const el = document.getElementById('exec-body');
  const errPct = r.total ? Math.round(r.errors/r.total*100) : 0;
  const runtimes = Object.entries(r.byRuntime||{}).sort((a,b)=>b[1]-a[1]);
  el.innerHTML = `
    <div class="flex-row">
      <div class="card">
        <h2>Exec Stats</h2>
        <div class="stats-grid">
          ${stat(r.total,'total spawns')}
          ${stat(r.errors,'errors')}
        </div>
        <div style="margin-top:12px"><h2>By Runtime</h2>
        ${runtimes.map(([rt,n])=>`<div class="bar-row"><span style="width:80px;font-size:11px">${rt}</span><div class="bar-bg"><div class="bar-fill" style="width:${r.total?Math.round(n/r.total*100):0}%"></div></div><span style="color:#8b949e;font-size:11px;width:40px;text-align:right">${n}</span></div>`).join('')}
        </div>
      </div>
      <div class="card" style="flex:2">
        <h2>Recent Spawns</h2>
        <table class="mini-table">
          <tr><th>Time</th><th>Runtime</th><th>OK</th><th>PID</th><th>CWD</th><th>Code</th></tr>
          ${(r.recent||[]).map(e=>`<tr><td class="ts">${fmtTs(e.ts)}</td><td><span class="badge b-blue">${e.runtime||'?'}</span></td><td>${e.ok===false?'<span class="badge b-red">err</span>':'<span class="badge b-green">ok</span>'}</td><td class="ts">${e.pid||''}</td><td class="ts" style="max-width:120px;overflow:hidden;text-overflow:ellipsis">${esc(e.cwd||'')}</td><td class="ts">${e.code_len||''}</td></tr>`).join('')}
        </table>
      </div>
    </div>`;
}

async function loadHooks() {
  const r = await api('/api/hooks');
  const el = document.getElementById('hooks-body');
  const evs = Object.entries(r.byEvent||{}).sort((a,b)=>b[1]-a[1]);
  el.innerHTML = `
    <div class="flex-row">
      <div class="card">
        <h2>Hook Stats</h2>
        ${stat(r.total,'total hooks')}
        <div style="margin-top:12px"><h2>By Event</h2>
        ${evs.map(([ev,n])=>`<div class="bar-row"><span style="width:120px;font-size:11px">${ev}</span><div class="bar-bg"><div class="bar-fill" style="width:${r.total?Math.round(n/r.total*100):0}%;background:var(--purple)"></div></div><span style="color:#8b949e;font-size:11px;width:40px;text-align:right">${n}</span></div>`).join('')}
        </div>
      </div>
      <div class="card" style="flex:2">
        <h2>Recent Hooks</h2>
        <table class="mini-table">
          <tr><th>Time</th><th>Event</th><th>Phase</th><th>PID</th><th>ms</th></tr>
          ${(r.recent||[]).map(e=>`<tr><td class="ts">${fmtTs(e.ts)}</td><td><span class="badge b-purple">${e.event||'?'}</span></td><td class="ts">${e.phase||''}</td><td class="ts">${e.pid||''}</td><td>${e.dur_ms||''}</td></tr>`).join('')}
        </table>
      </div>
    </div>`;
}

function renderTable(rows) {
  if (!rows || !rows.length) return '<p style="color:var(--muted);padding:16px;text-align:center">No events</p>';
  const cols = new Set();
  for (const r of rows) Object.keys(r).forEach(k => { if (!k.startsWith('_')) cols.add(k); });
  const keys = [...cols];
  const display = ['ts','event','pid',...keys.filter(k=>!['ts','event','pid','_sub','_day','_fp'].includes(k))];
  let html = '<table><tr>';
  html += '<th>sub</th>';
  for (const k of display) html += `<th>${k}</th>`;
  html += '</tr>';
  for (const r of rows) {
    const col = SUB_COLORS[r._sub] || '#8b949e';
    html += `<tr><td><span class="badge" style="background:${col}22;color:${col}">${r._sub||'?'}</span></td>`;
    for (const k of display) {
      const v = r[k];
      if (v === undefined || v === null) { html += '<td></td>'; continue; }
      if (k === 'ts') { html += `<td class="ts">${fmtTs(v)}</td>`; continue; }
      if (k === 'event') { html += `<td><strong>${esc(String(v))}</strong></td>`; continue; }
      if (typeof v === 'boolean') { html += `<td>${v?'<span class="badge b-green">✓</span>':'<span class="badge b-red">✗</span>'}</td>`; continue; }
      if (typeof v === 'object') {
        const s = JSON.stringify(v);
        if (s.length > 80) {
          html += `<td><details><summary style="cursor:pointer;font-size:10px;color:var(--accent)">${s.slice(0,40)}…</summary><pre class="json">${esc(s)}</pre></details></td>`;
        } else {
          html += `<td class="ts">${esc(s)}</td>`;
        }
        continue;
      }
      const sv = String(v);
      html += sv.length > 120 ? `<td title="${esc(sv)}">${esc(sv.slice(0,80))}…</td>` : `<td>${esc(sv)}</td>`;
    }
    html += '</tr>';
  }
  return html + '</table>';
}

function stat(val, lbl, cls='') {
  return `<div class="stat"><div class="stat-val ${cls}">${val}</div><div class="stat-lbl">${lbl}</div></div>`;
}

function fmtTs(ts) {
  if (!ts) return '';
  try { return new Date(ts).toLocaleTimeString('en-US',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit',fractionalSecondDigits:3}); } catch { return ts; }
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

async function api(path) {
  try { const r = await fetch(path); return r.json(); } catch { return {}; }
}

function appendLive(ev) {
  const el = document.getElementById('live-log');
  const col = SUB_COLORS[ev._sub] || '#8b949e';
  const div = document.createElement('div');
  div.className = 'entry';
  const payload = {...ev};
  delete payload._sub; delete payload._day; delete payload._fp;
  div.innerHTML = `<span class="ts">${fmtTs(ev.ts)}</span><span class="sub-tag" style="background:${col}22;color:${col};padding:0 5px;border-radius:2px">${ev._sub}</span><strong>${esc(ev.event||'?')}</strong> <span style="color:var(--muted);font-size:10px">${esc(JSON.stringify(payload).slice(0,200))}</span>`;
  el.appendChild(div);
  if (el.children.length > 2000) el.removeChild(el.firstChild);
  if (document.getElementById('live-auto-scroll').checked) el.scrollTop = el.scrollHeight;
}

let sse = null;
function connectSSE() {
  sse = new EventSource('/api/stream');
  const badge = document.getElementById('live-badge');
  sse.addEventListener('hello', () => { badge.textContent = 'live'; badge.classList.add('live'); });
  sse.addEventListener('event', e => {
    try {
      const ev = JSON.parse(e.data);
      appendLive(ev);
      if (currentPanel === 'overview') loadOverview();
    } catch {}
  });
  sse.onerror = () => { badge.textContent = 'reconnecting…'; badge.classList.remove('live'); setTimeout(connectSSE, 3000); sse.close(); };
}

window.show = show;
window.showSub = showSub;
window.evLoad = evLoad;
window.evPage = evPage;
window.subLoad = subLoad;
window.subPage = subPage;
window.doSearch = doSearch;

populateSelects();
loadOverview();
connectSSE();
</script>
</body>
</html>
